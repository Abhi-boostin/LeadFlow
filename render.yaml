# Render Infrastructure as Code: https://render.com/docs/blueprint-spec
# Set up at https://dashboard.render.com/blueprints by pointing Render at this repo.

services:
  - type: web
    name: leadflow-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @leadflow/db generate && pnpm --filter @leadflow/db migrate:deploy && pnpm --filter @leadflow/api build
    startCommand: pnpm --filter @leadflow/api start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: PNPM_VERSION
        value: "9.4.0"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: CRON_ENABLED
        value: "true"
