services:
  postgres:
    image: postgres:16-alpine
    container_name: leadflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow
    ports:
      - "5432:5432"
    volumes:
      - leadflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow -d leadflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leadflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - leadflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  leadflow-postgres-data:
  leadflow-redis-data:
